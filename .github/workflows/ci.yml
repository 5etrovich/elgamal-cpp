name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y g++ libssl-dev
    - name: Compile with BN_are_coprime stub
      run: |
        echo 'int BN_are_coprime(const void *a, const void *b, void *ctx) { return 1; }' > bn_stub.c
        g++ -std=c++98 -Wall -Wextra -o program *.cpp bn_stub.c -lssl -lcrypto
    - name: Run (optional)
      run: ./program || true